version: '3.8'

services:
  # ============================================================================
  # Backend API - Multi-Tenant LangGraph Agent
  # ============================================================================
  agent-api:
    image: ghcr.io/agenciardg/agente-politicosgabinete/api:latest
    environment:
      # Supabase (config tables)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL}

      # PostgreSQL (checkpoints + memory)
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      # JWT Authentication
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 30
      JWT_REFRESH_EXPIRE_DAYS: 7

      # xAI Grok API
      GROK_API_KEY: ${GROK_API_KEY}
      GROK_MODEL: ${GROK_MODEL:-grok-4-1-fast-non-reasoning}
      GROK_BASE_URL: https://api.x.ai/v1

      # Helena CRM
      HELENA_API_TOKEN: ${HELENA_API_TOKEN}
      HELENA_BASE_URL: https://api.helena.run
      HELENA_BOT_NUMBER: ${HELENA_BOT_NUMBER}

      # Environment
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      CORS_ORIGINS: https://agentepolitico.agenciardg.com.br,https://admin.agentepolitico.agenciardg.com.br,http://217.79.180.230:3010
      TZ: America/Sao_Paulo
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.agentepolitico-api.rule=Host(`agentepolitico.agenciardg.com.br`) && (PathPrefix(`/api`) || PathPrefix(`/docs`) || PathPrefix(`/openapi.json`))"
        - "traefik.http.routers.agentepolitico-api.entrypoints=websecure"
        - "traefik.http.routers.agentepolitico-api.tls.certresolver=letsencrypt"
        - "traefik.http.services.agentepolitico-api.loadbalancer.server.port=8000"
    networks:
      - RdgNet
      - internal

  # ============================================================================
  # Admin Panel - Next.js Frontend
  # ============================================================================
  admin:
    image: ghcr.io/agenciardg/agente-politicosgabinete/admin:latest
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3010:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.agentepolitico-admin.rule=Host(`agentepolitico.agenciardg.com.br`) && !PathPrefix(`/api`) && !PathPrefix(`/docs`) && !PathPrefix(`/openapi.json`)"
        - "traefik.http.routers.agentepolitico-admin.entrypoints=websecure"
        - "traefik.http.routers.agentepolitico-admin.tls.certresolver=letsencrypt"
        - "traefik.http.services.agentepolitico-admin.loadbalancer.server.port=3000"
    networks:
      - RdgNet
      - internal

networks:
  RdgNet:
    external: true
  internal:
    driver: overlay
