name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ============================================================================
  # Build and push Docker images
  # ============================================================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: api
            context: .
            dockerfile: Dockerfile
          - name: admin
            context: ./admin
            dockerfile: admin/Dockerfile
            build-args: |
              NEXT_PUBLIC_API_URL=https://agentepolitico.agenciardg.com.br/api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  # ============================================================================
  # Deploy to Portainer via webhook
  # ============================================================================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy via Portainer webhook
        env:
          WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        if: ${{ env.WEBHOOK_URL != '' }}
        run: |
          curl -X POST "$WEBHOOK_URL" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5
